<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Monochromatic dark background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="50%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>

    <!-- Shimmer gradient for name -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#333333">
        <animate attributeName="stop-color" values="#333333;#ffffff;#aaaaaa;#ffffff;#333333" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="40%" style="stop-color:#cccccc">
        <animate attributeName="stop-color" values="#cccccc;#ffffff;#eeeeee;#ffffff;#cccccc" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="60%" style="stop-color:#ffffff">
        <animate attributeName="stop-color" values="#ffffff;#aaaaaa;#ffffff;#cccccc;#ffffff" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#333333">
        <animate attributeName="stop-color" values="#333333;#ffffff;#aaaaaa;#ffffff;#333333" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for subtitle -->
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for scan line -->
    <clipPath id="clip">
      <rect width="900" height="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Animated grid lines (horizontal) -->
  <g opacity="0.07" clip-path="url(#clip)">
    <line x1="0" y1="25" x2="900" y2="25" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="50" x2="900" y2="50" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="75" x2="900" y2="75" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="900" y2="100" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="125" x2="900" y2="125" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="900" y2="150" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="175" x2="900" y2="175" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- Animated grid lines (vertical) -->
  <g opacity="0.04" clip-path="url(#clip)">
    <line x1="90" y1="0" x2="90" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="270" y1="0" x2="270" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="540" y1="0" x2="540" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="630" y1="0" x2="630" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="810" y1="0" x2="810" y2="200" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- Scan line sweep -->
  <rect x="0" y="0" width="900" height="3" fill="white" opacity="0.06" clip-path="url(#clip)">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,200" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Left decorative bracket -->
  <g filter="url(#softglow)">
    <polyline points="60,60 40,60 40,140 60,140" fill="none" stroke="#666666" stroke-width="1.5">
      <animate attributeName="stroke" values="#444444;#aaaaaa;#444444" dur="2.5s" repeatCount="indefinite"/>
    </polyline>
  </g>

  <!-- Right decorative bracket -->
  <g filter="url(#softglow)">
    <polyline points="840,60 860,60 860,140 840,140" fill="none" stroke="#666666" stroke-width="1.5">
      <animate attributeName="stroke" values="#444444;#aaaaaa;#444444" dur="2.5s" repeatCount="indefinite" begin="1.25s"/>
    </polyline>
  </g>

  <!-- Top thin accent line -->
  <line x1="100" y1="12" x2="800" y2="12" stroke="#ffffff" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x1" values="450;100;450" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="450;800;450" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Bottom thin accent line -->
  <line x1="100" y1="188" x2="800" y2="188" stroke="#ffffff" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="4s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="x1" values="450;100;450" dur="4s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="x2" values="450;800;450" dur="4s" repeatCount="indefinite" begin="2s"/>
  </line>

  <!-- Name text with shimmer -->
  <text
    x="450" y="95"
    font-family="'Courier New', Courier, monospace"
    font-size="32"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="4"
    fill="url(#shimmer)"
    filter="url(#glow)"
    opacity="0"
  >
    CARL JOSHUA H. LEPAOPAO
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.3s" fill="freeze"/>
  </text>

  <!-- Divider line -->
  <line x1="300" y1="113" x2="600" y2="113" stroke="#ffffff" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0;0.4" dur="0.5s" begin="0.9s" fill="freeze"/>
    <animate attributeName="x1" values="450;300" dur="0.5s" begin="0.9s" fill="freeze"/>
    <animate attributeName="x2" values="450;600" dur="0.5s" begin="0.9s" fill="freeze"/>
  </line>

  <!-- Subtitle -->
  <text
    x="450" y="142"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    font-weight="400"
    text-anchor="middle"
    letter-spacing="6"
    fill="#888888"
    opacity="0"
  >
    AN ASPIRING WEB DEVELOPER
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="1.1s" fill="freeze"/>
    <animate attributeName="fill" values="#555555;#999999;#555555" dur="3s" begin="2s" repeatCount="indefinite"/>
  </text>

  <!-- Blinking cursor after subtitle -->
  <rect x="690" y="130" width="2" height="16" fill="#888888" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.3;0.31;0.7;0.71;1" dur="1s" begin="1.9s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner dots -->
  <circle cx="20" cy="20" r="2" fill="#444444">
    <animate attributeName="fill" values="#333333;#aaaaaa;#333333" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="880" cy="20" r="2" fill="#444444">
    <animate attributeName="fill" values="#333333;#aaaaaa;#333333" dur="3s" repeatCount="indefinite" begin="0.75s"/>
  </circle>
  <circle cx="20" cy="180" r="2" fill="#444444">
    <animate attributeName="fill" values="#333333;#aaaaaa;#333333" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle cx="880" cy="180" r="2" fill="#444444">
    <animate attributeName="fill" values="#333333;#aaaaaa;#333333" dur="3s" repeatCount="indefinite" begin="2.25s"/>
  </circle>

  <!-- Border glow -->
  <rect x="1" y="1" width="898" height="198" fill="none" stroke="#333333" stroke-width="1" rx="11" opacity="0.6"/>
</svg>
